name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        node-version: [18]

    services:
      mongo:
        image: mongo:7
        command: ["--replSet", "rs0", "--bind_ip_all"]
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Initialize MongoDB replica set
        working-directory: .
        run: |
          docker exec "${{ job.services.mongo.id }}" mongosh --quiet --eval 'try { rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]}) } catch (err) { if (!String(err).includes("already initialized")) throw err }'
          docker exec "${{ job.services.mongo.id }}" mongosh --quiet --eval 'for (let i = 0; i < 30; i++) { if (rs.status().myState === 1) quit(0); sleep(1000); } quit(1);'

      - name: Run backend test suite
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/skillswap_ci?replicaSet=rs0
          DB_CONNECT_RETRIES: 1
          DB_CONNECT_RETRY_DELAY_MS: 1000
          REQUIRE_TRANSACTION_DB: true
          JWT_SECRET: ci-jwt-secret-with-enough-length-12345
          JWT_REFRESH_SECRET: ci-refresh-secret-with-enough-length-12345
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          DEFAULT_CREDITS: 10
          UPLOAD_DIR: ./uploads
          CLIENT_URL: http://localhost:5173
          GOOGLE_CLIENT_ID: ""
          JITSI_BASE_URL: https://meet.jit.si
          JITSI_ROOM_PREFIX: skillswap-ci
        run: npm test

      - name: Verify backend startup
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://127.0.0.1:27017/skillswap_ci_startup?replicaSet=rs0
          DB_CONNECT_RETRIES: 1
          DB_CONNECT_RETRY_DELAY_MS: 1000
          REQUIRE_TRANSACTION_DB: true
          JWT_SECRET: ci-jwt-secret-with-enough-length-12345
          JWT_REFRESH_SECRET: ci-refresh-secret-with-enough-length-12345
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          DEFAULT_CREDITS: 10
          UPLOAD_DIR: ./uploads
          CLIENT_URL: http://localhost:5173
          GOOGLE_CLIENT_ID: ""
          JITSI_BASE_URL: https://meet.jit.si
          JITSI_ROOM_PREFIX: skillswap
        run: |
          node server.js > server.log 2>&1 &
          SERVER_PID=$!

          for attempt in {1..10}; do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              cat server.log
              exit 1
            fi

            if curl --fail --silent --show-error http://127.0.0.1:5000/api/health > /dev/null; then
              kill "$SERVER_PID"
              wait "$SERVER_PID" || true
              exit 0
            fi

            sleep 1
          done

          cat server.log
          kill "$SERVER_PID" || true
          exit 1

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        node-version: [18]

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-check:
    name: Docker Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        node-version: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            app/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build backend Docker image
        run: docker build -t asep-server-test ./server

      - name: Build frontend Docker image
        run: docker build -t asep-app-test ./app

      - name: Verify Docker images exist
        run: |
          docker image inspect asep-server-test > /dev/null
          docker image inspect asep-app-test > /dev/null
