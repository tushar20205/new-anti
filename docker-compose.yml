services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      mongosh --host mongo:27017 --quiet --eval
      "try {
        rs.status();
      } catch (err) {
        rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
      }"
    restart: "no"

  server:
    build:
      context: ./server
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/skillswap?replicaSet=rs0&directConnection=true
      CLIENT_URL: https://skill-switch-new.vercel.app
      UPLOAD_DIR: /app/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ./app
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo-data:
  uploads-data:
